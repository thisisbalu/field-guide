# ── OVERVIEW ──────────────────────────────────────────────────────────────────
overview:
  concepts:
    - title: "⚖️ CAP Theorem & PACELC"
      body: >
        **CAP theorem**: a distributed system can guarantee at most two of three properties
        simultaneously during a **network partition**:
        - **Consistency** (C): every read returns the most recent write or an error
        - **Availability** (A): every request receives a (non-error) response
        - **Partition tolerance** (P): the system continues operating despite network partitions

        Network partitions are not optional in real distributed systems — they happen. So the
        real choice is **CP vs AP**: when a partition occurs, do you return an error (preserve
        consistency) or return potentially stale data (preserve availability)?

        **PACELC** extends CAP for the normal (no-partition) case: even when the network is
        healthy, there is a trade-off between **Latency** and **Consistency**. Synchronous
        replication is consistent but adds latency; asynchronous replication is faster but
        eventually consistent. Example: DynamoDB is AP/EL (available during partitions,
        low latency over consistency); HBase is CP/EC (consistent during partitions, consistent
        over latency).
      tags:
        - {text: "P is not optional", color: red}
        - {text: "CP = consistency over availability", color: orange}
        - {text: "AP = availability over consistency", color: green}

    - title: "🎯 Consistency Models"
      body: >
        From strongest to weakest:

        **Linearizability** (strong consistency): operations appear to execute instantaneously
        at some point between their invocation and response. A read always returns the value
        of the most recent write, globally. Requires coordination on every operation. Used by
        etcd, Zookeeper, Google Spanner.

        **Sequential consistency**: all nodes see operations in the same order, but that order
        doesn't have to match real time. Stronger than causal, weaker than linearizability.

        **Causal consistency**: operations that are causally related are seen in causal order
        by all nodes. Concurrent (causally unrelated) operations may be seen in different orders.
        MongoDB with causal sessions, Dynamo with vector clocks.

        **Eventual consistency**: if no new updates are made, all replicas will converge to the
        same value — eventually. No guarantee on when or what intermediate reads return.
        DNS, Cassandra (default), DynamoDB (default).
      tags:
        - {text: "linearizable = globally ordered", color: red}
        - {text: "causal = respects happens-before", color: orange}
        - {text: "eventual = best effort convergence", color: green}

    - title: "🗳️ Consensus: Raft"
      body: >
        **Consensus** is the problem of getting a group of nodes to agree on a value despite
        failures. Required for leader election, replicated state machines, and distributed locks.

        **Raft** solves consensus by electing a **leader** who handles all writes. Followers
        replicate the leader's log. Terms are monotonically increasing election epochs.

        **Leader election**: nodes start as followers. On timeout without a heartbeat, a follower
        becomes a candidate and requests votes. A candidate winning a majority becomes leader.
        Raft guarantees only one leader per term.

        **Log replication**: the leader appends entries to its log and sends them to followers.
        An entry is **committed** once a majority acknowledges it. Committed entries are never lost,
        even if the leader crashes.

        **Safety**: Raft's leader election ensures the winner always has the most complete committed
        log — a node votes for a candidate only if the candidate's log is at least as up-to-date.
      flows:
        - ["Follower timeout", "Candidate requests votes", "Majority votes → Leader", "Leader replicates log", "Majority ack → Commit"]
      tags:
        - {text: "majority quorum = (N/2)+1", color: orange}
        - {text: "leader has complete log", color: green}
        - {text: "term = election epoch", color: purple}

    - title: "🔁 Replication Strategies"
      body: >
        **Single-leader (leader-follower)**: all writes go to the leader; replicated to followers.
        Simple, strong consistency possible with synchronous replication. Leader is a bottleneck
        and single point of failure. Used by PostgreSQL, MySQL, Kafka (partition leader), Redis Sentinel.

        **Multi-leader**: multiple nodes accept writes; sync changes asynchronously. Higher
        write throughput, lower latency for geo-distributed writes. **Write conflicts** are
        possible and must be resolved (last-write-wins, custom merge, CRDTs).
        Used by CockroachDB (within a region), multi-region active-active databases.

        **Leaderless (Dynamo-style)**: any node accepts reads/writes. Quorum reads and writes
        (`W + R > N` for strong consistency). Conflicts resolved at read time via version vectors.
        Used by Cassandra, DynamoDB, Riak.

        **Quorum**: with N replicas, write to W nodes, read from R nodes. If `W + R > N`,
        at least one node in every read set overlaps every write set — guaranteeing you read
        the latest write. Tune W and R based on read/write ratio.
      tags:
        - {text: "W + R > N = strong consistency", color: green}
        - {text: "multi-leader = conflict risk", color: red}
        - {text: "leaderless = no SPOF", color: orange}

    - title: "💥 Failure Detection & Fault Tolerance"
      body: >
        **Timeouts** are the only way to detect failures in asynchronous networks — there is no
        reliable "node is dead" signal. A slow response is indistinguishable from a crashed node
        until the timeout fires. Too short → false positives (healthy nodes marked dead); too long
        → slow failure detection.

        **Heartbeats**: nodes periodically send "I'm alive" signals. Missing heartbeats trigger
        failure suspicion. Raft, ZooKeeper, Kafka all use heartbeats with configurable timeouts.

        **Phi Accrual Failure Detector** (Cassandra, Akka): instead of a binary alive/dead,
        outputs a suspicion level (phi) that increases as heartbeats are missed. Callers choose
        a phi threshold for their use case — more nuanced than a hard timeout.

        **Gossip protocol**: nodes periodically exchange state with random peers; information
        propagates epidemically. Used for membership (Cassandra ring), failure detection, and
        metadata dissemination. Scales to thousands of nodes with O(log N) convergence time.
      tags:
        - {text: "timeouts = only failure signal", color: orange}
        - {text: "gossip = O(log N) propagation", color: green}
        - {text: "slow ≠ dead in async networks", color: red}

    - title: "📦 Distributed Transactions & Patterns"
      body: >
        **Two-Phase Commit (2PC)**: coordinator asks all participants to **prepare** (lock
        resources, write to WAL), then **commits** (or aborts) based on all votes. Guarantees
        atomicity across services. Fatal flaw: if the coordinator crashes after prepare but
        before commit, participants are blocked — holding locks — until the coordinator recovers.
        Blocking protocol.

        **SAGA**: a long-lived transaction decomposed into a sequence of local transactions,
        each with a **compensating transaction** (undo). If step N fails, steps N-1 through 1
        are compensated in reverse. No distributed lock held across steps. Two flavors:
        choreography (services react to events) and orchestration (a central coordinator
        drives the sequence).

        **Outbox pattern**: instead of writing to a database AND publishing an event (dual write,
        risk of inconsistency), write both to the database atomically in a single local transaction
        using an **outbox table**. A separate relay process reads the outbox and publishes to
        the message broker — exactly once, in order.
      flows:
        - ["Local DB write + Outbox row (atomic)", "Relay reads outbox", "Relay publishes event", "Mark outbox row processed"]
      tags:
        - {text: "2PC = blocking on coordinator crash", color: red}
        - {text: "SAGA = compensations not rollback", color: orange}
        - {text: "outbox = atomic dual write", color: green}

    - title: "🕰️ Vector Clocks & Hybrid Logical Clocks"
      body: >
        **The problem**: wall clocks on different machines drift by milliseconds to seconds even
        with NTP. NTP corrections can move clocks backward. Timestamp-based "last write wins"
        silently discards writes from machines with slightly fast clocks.

        **Lamport timestamps**: each node maintains a counter. On event: increment. On send:
        include counter. On receive: `counter = max(local, received) + 1`. Guarantee:
        if A causally precedes B, then `ts(A) < ts(B)`. The converse is not guaranteed —
        a lower timestamp does not mean "happened before."

        **Vector clocks**: each node maintains a vector of counters, one per node
        (`{A:3, B:1, C:2}`). On event: increment own entry. On send: include vector.
        On receive: element-wise max, then increment own entry. Two events are **concurrent**
        if neither vector dominates the other — this is a conflict. Used by Dynamo and Riak
        for conflict detection in leaderless replication.

        **Hybrid Logical Clocks (HLC)**: combines physical time with a logical counter:
        `HLC = (wall_clock, logical_counter)`. The physical component provides approximate
        real-time ordering; the logical counter breaks ties within the same physical tick.
        Used by **CockroachDB** for multi-version reads and distributed snapshots. Google
        **Spanner** uses TrueTime (GPS + atomic clocks with bounded uncertainty interval)
        to achieve external consistency — committing a write waits for the uncertainty window
        to pass, guaranteeing a globally consistent ordering.
      flows:
        - ["Physical clock (NTP)", "HLC: max(physical, received) + logical", "Bounded staleness reads", "Global consistent snapshot without global lock"]
      tags:
        - {text: "vector clock = concurrent event detection", color: orange}
        - {text: "HLC = physical + logical hybrid", color: green}
        - {text: "Spanner TrueTime = GPS bounded skew", color: purple}

  gotchas:
    - title: "Partial failure is harder than total failure"
      body: >
        A completely failed node is easy to detect and handle. A node that responds slowly,
        drops 10% of messages, or returns incorrect results for some keys is far harder.
        Your system must assume that at any moment, some subset of nodes is in an unknown state:
        alive, dead, or Byzantine (returning incorrect data). Design for partial failure as the
        norm, not the exception. Cascading failures are almost always triggered by slow partial
        failures, not clean crashes.

    - title: "You cannot rely on wall clocks for ordering in distributed systems"
      body: >
        System clocks on different machines can differ by milliseconds to seconds, even with NTP.
        NTP corrections can move clocks backward. A timestamp-based "latest write wins" conflict
        resolution will silently discard writes from machines with slightly fast clocks.
        Use **logical clocks** (Lamport timestamps) or **vector clocks** for causal ordering.
        The only exception is Google Spanner's TrueTime, which uses GPS and atomic clocks with
        bounded uncertainty — most systems don't have this.

    - title: "Idempotency is harder than adding an idempotency key"
      body: >
        An idempotent operation produces the same result regardless of how many times it's called.
        The hard part: at-least-once message delivery means your consumer will process duplicate
        messages. Simply storing an idempotency key is not enough if checking and storing are not
        atomic with the operation. A race condition between two concurrent identical requests can
        result in both being processed. Use a database unique constraint on the idempotency key
        to make the check-and-store atomic — a second write will fail, not slip through.

    - title: "Network partitions are routine — not edge cases"
      body: >
        Teams design for the happy path (all nodes reachable) and treat partitions as rare
        catastrophes. In practice, brief network partitions happen multiple times per day in
        any large system: a switch reboot, a BGP flap, a VM live migration, a cloud AZ hiccup.
        Design your system to handle partitions gracefully — degrade, queue, or return cached
        data — rather than assuming they won't happen. A system that works perfectly for 364
        days but completely fails for hours on day 365 has an effective availability far below
        its theoretical uptime.

    - title: "Leader election does not prevent split-brain without fencing"
      body: >
        When a leader crashes and a new leader is elected, the old leader may still be running
        (GC pause, network partition making it think it's still leader). If both leaders accept
        writes, you have split-brain — diverged state that may be impossible to reconcile.
        **Fencing tokens** (monotonically increasing lease numbers) prevent this: every write
        operation includes the current fence token; the storage layer rejects writes with an
        outdated token. The old leader's writes are rejected because its token is stale.

    - title: "The thundering herd on cache expiry or leader failover"
      body: >
        When a cache entry expires, all requests that were being served from it simultaneously
        hit the database — the thundering herd. Similarly, when a leader fails over, all
        clients simultaneously try to reconnect and may overwhelm the new leader. Mitigation:
        **probabilistic early expiration** (refresh the cache slightly before TTL, randomly),
        **request coalescing** (only one goroutine fetches; others wait for the result), and
        **exponential backoff with jitter** on reconnects. Pure exponential backoff without
        jitter synchronizes retries — adding jitter spreads the load.

  when_to_use:
    - "When a single machine cannot handle the load, storage, or availability requirements"
    - "When fault tolerance is required — a single node failure must not cause service outage"
    - "When data must be geographically distributed to reduce latency for global users"
    - "When horizontal scaling is needed — adding nodes should linearly increase capacity"

  when_not_to_use:
    - "When a single machine is sufficient — distributed systems add complexity without benefit at small scale"
    - "When strong consistency is required and you cannot tolerate the latency or availability cost of coordination"
    - "When the team lacks the operational maturity to handle split-brain, partition handling, and clock skew"
    - "As a first choice — start with a well-understood single-node system and distribute only when you hit real limits"

# ── DEEP DIVE ─────────────────────────────────────────────────────────────────
deep_dive:
  tables:
    - title: "🎯 Consistency Model Comparison"
      full_width: true
      rows:
        - {key: "Linearizability", value: "Every op appears atomic at a single point in real time. Reads always see the latest committed write. Requires global coordination. Highest latency. Used by: etcd, Zookeeper, Google Spanner, CockroachDB."}
        - {key: "Sequential Consistency", value: "All nodes agree on a global operation order, but that order doesn't have to match real time. Weaker than linearizability. Used in some CPU memory models."}
        - {key: "Causal Consistency", value: "Causally related ops seen in causal order by all nodes. Concurrent ops may be seen in different order. Requires vector clocks or dependency tracking. Used by: MongoDB causal sessions, Amazon Aurora."}
        - {key: "Read-your-writes", value: "After a client writes, it always sees that write in subsequent reads (from any replica). Not system-wide — only for the writing client. Often guaranteed via sticky sessions or session tokens."}
        - {key: "Monotonic reads", value: "Once a client reads a value, subsequent reads never return an older value. Prevents 'time going backwards' for a single client."}
        - {key: "Eventual Consistency", value: "Given no new updates, all replicas converge to the same value eventually. No bound on convergence time. No guarantees on intermediate reads. Used by: Cassandra (default), DynamoDB (default), DNS."}

    - title: "🗳️ Consensus Protocol Comparison"
      full_width: true
      rows:
        - {key: "Raft", value: "Designed for understandability. Single leader per term. Log-based. Used by: etcd, CockroachDB, TiKV, Consul. Leader election is simple; log replication is straightforward. Easiest to implement correctly."}
        - {key: "Multi-Paxos", value: "Original consensus algorithm. More complex than Raft; many variants (Classic, Fast, Cheap). Leader-based after initial leader election. Used by: Google Chubby, older Zookeeper versions, many academic systems."}
        - {key: "ZAB (Zookeeper Atomic Broadcast)", value: "Zookeeper's proprietary protocol. Similar to Paxos/Raft. Leader-based. Guarantees total order of updates. Primary difference: optimized for broadcast (one-to-many), not point-to-point consensus."}
        - {key: "PBFT (Practical Byzantine Fault Tolerance)", value: "Tolerates f Byzantine (malicious/arbitrary) faults with 3f+1 nodes. Very expensive — O(n²) message complexity. Used in blockchain and financial systems requiring Byzantine fault tolerance."}
        - {key: "Viewstamped Replication", value: "Predecessor to Raft/Paxos in some sense. View-based leadership. Less well-known but theoretically equivalent to Paxos. Historical significance; rarely used in new systems."}

    - title: "🔁 Replication & Quorum Reference"
      rows:
        - {key: "N (replication factor)", value: "Total number of replicas. Typically 3 (tolerates 1 failure) or 5 (tolerates 2 failures). Increasing N improves fault tolerance but increases write cost."}
        - {key: "W (write quorum)", value: "Number of nodes that must acknowledge a write. W=1 is fastest, least durable. W=N is most durable but slowest."}
        - {key: "R (read quorum)", value: "Number of nodes queried for a read; returns the most recent value. R=1 is fastest. R=N is slowest."}
        - {key: "W + R > N", value: "Strong consistency: any read set overlaps any write set — guaranteed to include at least one node with the latest write. N=3, W=2, R=2 is common."}
        - {key: "W + R ≤ N", value: "Possible to read stale data (no guaranteed overlap between write and read quorum). Trade consistency for availability or latency."}
        - {key: "Hinted handoff", value: "If a target replica is unavailable during a write, another node temporarily stores the write (hint) and delivers it when the target recovers. Improves write availability at the cost of temporary inconsistency."}

    - title: "🛡️ Resilience Patterns"
      full_width: true
      rows:
        - {key: "Circuit Breaker", value: "After N consecutive failures to a downstream, open the circuit — stop calling the downstream and return a fast error. After a timeout, allow one probe request. If it succeeds, close the circuit. Prevents cascading failures and gives the downstream time to recover."}
        - {key: "Bulkhead", value: "Isolate resources (thread pools, connection pools, semaphores) per downstream dependency. One slow dependency fills its own pool, not the shared pool — other dependencies remain unaffected. Named after ship hull compartments."}
        - {key: "Retry with exponential backoff + jitter", value: "Retry on transient failures with doubling intervals. Add random jitter to avoid synchronized retry storms from many clients. Cap at a maximum backoff. Only retry on idempotent operations or those with idempotency keys."}
        - {key: "Timeout", value: "Every outbound call must have a timeout. Without timeouts, a single slow downstream causes threads/goroutines to accumulate until the calling service is exhausted. Set timeouts derived from SLA requirements, not arbitrary large values."}
        - {key: "Backpressure", value: "Signal to producers to slow down when consumers are overwhelmed. TCP flow control is a network-level example. Application-level: bounded queues that block producers, reactive streams with demand signaling. Prefer backpressure over unbounded buffers that hide overload."}
        - {key: "Idempotency key", value: "Client-generated unique ID per logical operation. Server stores (idempotency_key, result). On duplicate, return stored result without re-executing. Enforced with a unique DB constraint on idempotency_key to prevent races."}

  cli:
    - label: "Raft & etcd"
      commands:
        - "etcdctl endpoint health --cluster                          # check all cluster members"
        - "etcdctl endpoint status --cluster -w table                 # show leader and raft index"
        - "etcdctl member list -w table                               # list cluster members"
        - "etcdctl put /key value                                     # write a key"
        - "etcdctl get /key                                           # read a key"
        - "etcdctl watch /key                                         # watch for changes"
        - "etcdctl lease grant 60                                     # create a 60s TTL lease"
        - "etcdctl put /lock 'holder' --lease=<lease-id>             # distributed lock via lease"

    - label: "Distributed Debugging"
      commands:
        - "# Check clock skew across nodes (should be < 100ms)"
        - "for h in node1 node2 node3; do ssh $h 'date +%s%3N'; done"
        - "# Network partition simulation with tc (Linux traffic control)"
        - "tc qdisc add dev eth0 root netem delay 100ms              # add 100ms latency"
        - "tc qdisc add dev eth0 root netem loss 10%                 # simulate 10% packet loss"
        - "tc qdisc del dev eth0 root                                 # remove impairment"
        - "# Check connection states"
        - "ss -s                                                       # socket summary"
        - "ss -tp state established                                    # established TCP connections"

    - label: "Chaos Engineering"
      commands:
        - "# Chaos Mesh (Kubernetes) — inject failures"
        - "kubectl apply -f network-chaos.yaml                        # inject network partition"
        - "kubectl apply -f pod-kill.yaml                             # randomly kill pods"
        - "# Toxiproxy — proxy-based fault injection"
        - "toxiproxy-cli create mydb -l 0.0.0.0:5433 -u db:5432     # create proxy"
        - "toxiproxy-cli toxic add mydb -t latency -a latency=200    # add 200ms latency"
        - "toxiproxy-cli toxic add mydb -t bandwidth -a rate=100     # limit to 100 KB/s"
        - "toxiproxy-cli toxic remove mydb --toxic-name latency_upstream"

  comparison:
    title: "CP vs AP Systems — Popular Databases & Their Trade-offs"
    headers: ["System", "CAP Classification", "Consistency Model", "Replication", "Best For"]
    rows:
      - ["etcd / Zookeeper", "CP", "Linearizable", "Raft / ZAB; single leader", "Distributed coordination, leader election, config"]
