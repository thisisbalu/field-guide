# ── OVERVIEW ──────────────────────────────────────────────────────────────────
overview:
  concepts:
    - title: "📋 JPA vs Hibernate"
      body: >
        **JPA (Jakarta Persistence API)** is a specification — a set of interfaces and
        annotations (`jakarta.persistence.*`) defining how Java objects map to relational
        databases: entity mapping, JPQL, the EntityManager lifecycle, and transaction handling.

        **Hibernate** is the dominant JPA *implementation*. It translates JPA calls into
        SQL, manages the Session, handles caching and dirty checking, and provides many
        extensions beyond the spec (HQL, Criteria API, Envers, spatial types).

        **Spring Data JPA** adds a repository abstraction on top of JPA — generating
        query implementations from method names (`findByEmailAndStatus(...)`) and reducing
        boilerplate EntityManager code.

        In practice: code to JPA interfaces; use Hibernate extensions only when JPA can't
        express what you need, accepting the provider lock-in that entails.
      tags:
        - {text: "JPA = spec", color: orange}
        - {text: "Hibernate = implementation", color: green}
        - {text: "Spring Data JPA = abstraction layer"}

    - title: "♻️ Entity Lifecycle"
      body: >
        Every entity instance lives in one of four states:

        **Transient** — created with `new`, unknown to Hibernate, no DB row.

        **Persistent (Managed)** — associated with an open Session. All changes are tracked
        automatically via dirty checking; Hibernate flushes them to the DB at commit.

        **Detached** — Session was closed or `evict()` called. Changes are no longer
        tracked. Accessing LAZY associations throws `LazyInitializationException`.
        Re-attach via `merge()` to create a new persistent copy.

        **Removed** — `remove()` called on a persistent entity; the DB row will be deleted
        on flush/commit.
      flows:
        - ["new → Transient", "persist()", "Persistent", "close Session", "Detached"]
        - ["Persistent", "remove()", "Removed", "flush/commit", "DB DELETE"]
      tags:
        - {text: "dirty checking = persistent only", color: orange}
        - {text: "LazyInit risk = detached state", color: red}

    - title: "🔍 Session / EntityManager"
      body: >
        The **Session** (Hibernate) / **EntityManager** (JPA) is a *Unit of Work* that:

        - Holds a **first-level cache** (identity map): loading the same entity by ID within
          one Session returns the same Java object instance — no duplicate SELECTs.
        - Tracks all persistent entities for **dirty checking** at flush time.
        - Scopes the transaction context.

        A Session is short-lived — one request, one transaction. The **SessionFactory** /
        **EntityManagerFactory** is expensive to build and lives as an application singleton.

        In Spring Boot, `@PersistenceContext EntityManager em` injects a thread-safe
        proxy to the current transaction-scoped EntityManager.
      tags:
        - {text: "Session = Unit of Work", color: green}
        - {text: "SessionFactory = singleton", color: orange}
        - {text: "L1 cache = per Session"}

    - title: "⚡ Lazy vs Eager Fetching"
      body: >
        **EAGER** — associated data is loaded immediately with the parent, typically via a JOIN.
        **LAZY** — a proxy is returned; the DB is hit only on first access.

        **JPA defaults (memorise these):**
        - `@ManyToOne` → EAGER
        - `@OneToOne` → EAGER
        - `@OneToMany` → LAZY
        - `@ManyToMany` → LAZY

        `@ManyToOne` being EAGER by default is a common trap: loading 100 orders
        automatically JOINs the customer table every time, even when it's not needed.

        **The N+1 problem**: loading N entities then accessing a LAZY collection per entity
        fires N additional SELECTs. Fix with `JOIN FETCH` in JPQL, `@BatchSize`, or
        `@EntityGraph`. Never "fix" globally with EAGER — it causes over-fetching on all queries.
      flows:
        - ["Load 10 Orders (1 query)", "access order.getItems() in loop", "10 more queries = N+1"]
      tags:
        - {text: "@ManyToOne: EAGER default", color: red}
        - {text: "@OneToMany: LAZY default", color: green}
        - {text: "JOIN FETCH to eliminate N+1", color: orange}

    - title: "📦 Caching: L1, L2, Query"
      body: >
        **First-level cache (L1)** — an identity map built into every Session. Always on,
        cannot be disabled. Deduplicates entity lookups by PK within a transaction.

        **Second-level cache (L2)** — optional, shared across all Sessions in the
        SessionFactory. Annotate entities with `@Cache(usage=READ_WRITE)` and configure a
        provider (EhCache, Caffeine, Hazelcast, Redis). Ideal for reference data that
        changes rarely. Risk: stale entries when another node or direct JDBC write changes
        the DB without going through Hibernate — requires distributed invalidation in
        multi-node deployments.

        **Query cache** — caches result-set identifiers for JPQL queries. Only useful with
        L2 cache; rarely worth the complexity.
      tags:
        - {text: "L1 = always on, per Session", color: green}
        - {text: "L2 = opt-in, cross-Session", color: orange}
        - {text: "stale data risk in clusters", color: red}

    - title: "🔄 Transactions & @Transactional"
      body: >
        JPA requires an active transaction to flush changes. Spring's `@Transactional`
        opens a transaction at method entry and commits or rolls back at exit via AOP proxy.

        **Propagation behaviours:**
        - `REQUIRED` (default) — join an existing transaction or start a new one
        - `REQUIRES_NEW` — always start a new transaction, suspending any outer one
        - `SUPPORTS` — use a transaction if one exists; otherwise run non-transactionally

        **Rollback rules:** Spring rolls back on unchecked exceptions by default. Use
        `rollbackFor = Exception.class` to include checked exceptions.

        **Self-invocation trap:** calling a `@Transactional` method from another method
        in the *same bean* bypasses the AOP proxy — the transaction annotation has no effect.
      tags:
        - {text: "REQUIRED = default propagation", color: green}
        - {text: "self-invocation bypasses proxy", color: red}
        - {text: "rollback = unchecked by default", color: orange}

    - title: "🏗️ Inheritance Strategies"
      body: >
        **SINGLE_TABLE** (default) — all subclasses share one table with a discriminator
        column. Fast queries, no JOINs, but many nullable columns; can't enforce NOT NULL
        on subtype-specific fields.

        **JOINED** — parent in one table, each subclass in its own table linked by PK/FK.
        Fully normalised, enforces constraints, but polymorphic queries need JOINs across
        all subtype tables.

        **TABLE_PER_CLASS** — each concrete class gets its own full table with all
        inherited columns. No JOINs for single-type queries, but polymorphic queries
        require UNION — slow and unindexable. Generally avoid.

        **Rule of thumb:** few subtypes with many shared fields → SINGLE_TABLE.
        Many unique fields per subtype with data integrity requirements → JOINED.
      tags:
        - {text: "SINGLE_TABLE: fast, nullable", color: orange}
        - {text: "JOINED: normalised, JOINs", color: green}
        - {text: "TABLE_PER_CLASS: UNION penalty", color: red}

    - title: "🔒 Optimistic & Pessimistic Locking"
      body: >
        **Optimistic locking (`@Version`)** — prevents lost updates without DB locks.
        Hibernate adds `WHERE version = ?` to every UPDATE. If another transaction committed
        first, 0 rows are updated → `OptimisticLockException`. The caller must catch and retry.
        Best for low write-contention workloads.

        **Pessimistic locking** — `em.find(Entity.class, id, PESSIMISTIC_WRITE)` issues
        `SELECT ... FOR UPDATE`, serialising access at the DB level. Correct for high-contention
        scenarios (inventory decrement, seat booking) but reduces throughput and can cause
        deadlocks if not applied consistently.

        Never rely on application-level `if (stock > 0)` checks — a concurrent transaction
        can pass the check and commit between your read and write.
      tags:
        - {text: "@Version = optimistic", color: green}
        - {text: "PESSIMISTIC_WRITE = FOR UPDATE", color: orange}
        - {text: "OptimisticLockException → retry", color: red}

  gotchas:
    - title: "N+1 Select Problem"
      body: >
        Loading N entities and accessing a LAZY collection on each fires N additional queries.
        **Fix per query**: use `JOIN FETCH` in JPQL. For multiple collections, use `@BatchSize(size=25)`
        — Hibernate batches proxy initialisation with an `IN` clause, turning N queries into
        ceil(N/25). `@EntityGraph` gives per-repository control without altering entity defaults.
        Never change global fetch to EAGER — that trades N+1 for always-joining on every query.

    - title: "LazyInitializationException"
      body: >
        Thrown when a LAZY proxy is accessed after the Session is closed — most commonly
        in a serialiser (Jackson) touching fields outside the `@Transactional` boundary,
        or in an `@Async` method that received a detached entity from the calling thread.
        **Fix**: return DTOs from your service layer, use `JOIN FETCH` to load what you need
        inside the transaction, or explicitly initialise with `Hibernate.initialize()` before
        the Session closes. Do NOT enable OSIV to suppress this — it just hides the symptom.

    - title: "Open Session In View (OSIV) Enabled by Default"
      body: >
        Spring Boot sets `spring.jpa.open-in-view=true` by default, keeping the Hibernate
        Session open for the entire HTTP request so LAZY associations can be accessed in
        serialisers. At scale this silently causes N+1 queries outside transactions, holds
        DB connections for the full request duration (including I/O waits), and bleeds data
        access concerns into the web layer.
        **Action**: set `spring.jpa.open-in-view=false` and use service-layer DTOs.

    - title: "Dirty Checking Surprises"
      body: >
        Any field change on a persistent entity is flushed automatically at commit — no
        `save()` call required. This means loading an entity, calling a setter for local
        computation only, and accidentally persisting the change.
        **Fix**: annotate read-only service methods with `@Transactional(readOnly=true)` —
        Hibernate skips dirty checking entirely, improving performance and preventing
        accidental writes.

    - title: "equals() / hashCode() on Entities"
      body: >
        Hibernate proxies are subclasses of your entity — `instanceof` in `equals()` breaks
        proxy comparison. Using the DB-generated ID means two newly persisted (transient)
        entities with `id=null` are incorrectly equal in Sets/Maps.
        **Best practice**: implement `equals()`/`hashCode()` on a **natural business key**
        (e.g., a UUID assigned before persist, or a unique domain attribute) rather than
        the surrogate DB key.

    - title: "CascadeType.ALL + orphanRemoval Without Care"
      body: >
        `CascadeType.ALL` with `orphanRemoval=true` on a `@OneToMany` means removing a
        child from the Java collection triggers a DELETE in the DB.
        A seemingly innocent `collection.clear()` inside a transaction deletes every element.
        Use cascade types precisely: typically only PERSIST and MERGE are needed.
        Reserve REMOVE + orphanRemoval for true ownership relationships where the child
        cannot exist without the parent.

  when_to_use:
    - "Complex domain models with rich object graphs and bidirectional relationships"
    - "Rapid development where hand-written SQL CRUD boilerplate slows iteration"
    - "Projects on the Spring ecosystem where Spring Data JPA is a first-class citizen"
    - "Applications requiring portable, database-agnostic query code via JPQL"
    - "When built-in audit trails, optimistic locking, and entity versioning are required"

  when_not_to_use:
    - "High-volume batch processing — use StatelessSession, JDBC directly, or Spring Batch"
    - "Simple CRUD with 2–3 tables — Spring Data JDBC is lighter and more predictable"
    - "Reporting/analytics queries — raw SQL with projections or jOOQ is far more expressive"
    - "Microservices owning a single narrow aggregate — JDBC avoids the ORM overhead"

