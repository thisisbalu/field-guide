  tables:
    - title: "Core JPA Annotations"
      full_width: false
      rows:
        - {key: "@Entity", value: "Marks a class as a JPA entity mapped to a DB table"}
        - {key: "@Table(name=...)", value: "Overrides the default table name derived from class name"}
        - {key: "@Id", value: "Designates the primary key field"}
        - {key: "@GeneratedValue", value: "PK generation strategy: AUTO, IDENTITY, SEQUENCE, TABLE"}
        - {key: "@Column", value: "Column override: name, nullable, unique, length, insertable, updatable"}
        - {key: "@Transient", value: "Excludes a field from persistence — not mapped to any column"}
        - {key: "@Version", value: "Optimistic lock version field (Long or Timestamp); auto-incremented on UPDATE"}
        - {key: "@Embeddable / @Embedded", value: "Value type embedded inline in the owning entity's table (no separate PK)"}
        - {key: "@MappedSuperclass", value: "Base class whose mappings are inherited but is not itself an entity"}
        - {key: "@Enumerated(STRING)", value: "Persist enum by name. Avoid ORDINAL — breaks silently when enum order changes"}

    - title: "Relationship Annotations & Fetch Defaults"
      full_width: false
      rows:
        - {key: "@ManyToOne", value: "Default EAGER. Always name the FK with @JoinColumn(name=...) explicitly"}
        - {key: "@OneToMany", value: "Default LAZY. Non-owning side; requires mappedBy on bidirectional"}
        - {key: "@OneToOne", value: "Default EAGER. True LAZY requires bytecode enhancement for proxy support"}
        - {key: "@ManyToMany", value: "Default LAZY. Creates a join table; if the join table needs extra columns, model it as an @Entity with two @ManyToOne instead"}
        - {key: "mappedBy", value: "Marks the inverse (non-owning) side; the owning side holds the FK column"}
        - {key: "@JoinColumn", value: "Specifies FK column name, nullable, and constraint options"}
        - {key: "orphanRemoval=true", value: "Deletes child entity from DB when removed from parent's collection"}

    - title: "Cascade Types"
      full_width: false
      rows:
        - {key: "PERSIST", value: "New children are saved when parent is persisted"}
        - {key: "MERGE", value: "Detached children are merged when parent is merged"}
        - {key: "REMOVE", value: "Children are deleted when parent is deleted"}
        - {key: "REFRESH", value: "Children are reloaded from DB when parent is refreshed"}
        - {key: "DETACH", value: "Children are detached from Session when parent is detached"}
        - {key: "ALL", value: "All of the above. Use carefully — REMOVE can delete data unexpectedly"}

    - title: "Inheritance Strategies Compared"
      full_width: true
      rows:
        - {key: "SINGLE_TABLE", value: "All subclasses in one table with a discriminator column. No JOINs, fast queries. Downside: subtype-specific columns are nullable; cannot enforce NOT NULL."}
        - {key: "JOINED", value: "Parent table + one table per subclass joined by PK. Normalised, enforces constraints. Downside: polymorphic queries JOIN all subtype tables."}
        - {key: "TABLE_PER_CLASS", value: "Each concrete class gets its own full table. No JOINs for single-type. Downside: polymorphic queries use UNION — avoid this strategy."}

    - title: "Key Spring JPA / Hibernate Properties"
      full_width: false
      rows:
        - {key: "spring.jpa.hibernate.ddl-auto", value: "none | validate | update | create | create-drop. Use none or validate in production. Never update in prod."}
        - {key: "spring.jpa.open-in-view", value: "Disable (false) in production to avoid silent N+1 and connection exhaustion"}
        - {key: "spring.jpa.show-sql", value: "Quick SQL logging; prefer logging.level.org.hibernate.SQL=DEBUG for control"}
        - {key: "hibernate.jdbc.batch_size", value: "Batch INSERT/UPDATE statements (25–50). Also set order_inserts=true and order_updates=true"}
        - {key: "hibernate.default_batch_fetch_size", value: "Batch-fetches LAZY collections using IN clauses — reduces N+1 without JOIN FETCH"}
        - {key: "hibernate.generate_statistics", value: "Enables Statistics MBean for query count, cache hit/miss, and timing per Session"}

