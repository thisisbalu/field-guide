      full_width: false
      rows:
        - key: "compile (default)"
          value: "Available in compile, test, and runtime classpaths. Included in packaged artifact."
        - key: "provided"
          value: "Available in compile + test classpaths. NOT included in package. Container provides at runtime (e.g., servlet-api in WAR → Tomcat provides it)."
        - key: "runtime"
          value: "NOT available at compile time. Available at test and runtime. Use for: JDBC drivers, SLF4J bindings."
        - key: "test"
