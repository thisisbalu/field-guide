# ── OVERVIEW ──────────────────────────────────────────────────────────────────
overview:
  concepts:
    - title: "🔄 Maven Build Lifecycle"
      body: >
        Maven organizes builds into three built-in lifecycles: **default** (build and deploy),
        **clean** (remove previous build outputs), **site** (generate project docs).

        The **default lifecycle** has 23 phases; the key ones are: `validate` → `compile` →
        `test` → `package` → `verify` → `install` → `deploy`. Running `mvn package` executes
        all phases up to and including `package`. Plugins bind their goals to phases:
        `maven-compiler-plugin:compile` binds to the `compile` phase automatically.

        **Key insight:** you don't call plugin goals directly in CI — you call lifecycle
        phases. The phases invoke the bound goals. Skip phases when needed:
        `mvn package -DskipTests` skips test execution but still compiles tests.
        `-Dmaven.test.skip=true` skips both compilation and execution of tests.
      tags:
        - {text: "validate → compile → test → package", color: blue}
        - {text: "phases invoke goals", color: green}
        - {text: "-DskipTests", color: orange}

    - title: "📦 Maven Dependency Management"
      body: >
        Dependencies declared in `<dependencies>` are resolved from repositories (Maven Central,
        Nexus, Artifactory) and cached in `~/.m2/repository`.

        **Scopes:** `compile` (default — on all classpaths), `provided` (compile + test only,
        not packaged — e.g., servlet-api), `runtime` (runtime + test, not compile — JDBC driver),
        `test` (test compile + runtime only — JUnit), `system` (explicit path, avoid).

        **Transitive dependencies:** Maven resolves the full dependency graph. Conflicts use
        **nearest-wins** (shallowest in the tree wins). Override with `<dependencyManagement>`
        to pin versions centrally. Use `mvn dependency:tree` to visualize the full graph
        and find conflicting/unexpected transitive deps.

        **BOM (Bill of Materials):** a POM with `<dependencyManagement>` only — import it
        with `<scope>import</scope>` to inherit consistent versions across a suite.
        Spring Boot BOM is the canonical example.
      tags:
        - {text: "nearest-wins conflict", color: orange}
        - {text: "BOM for version sets", color: green}
        - {text: "mvn dependency:tree", color: blue}

    - title: "🏗️ Maven Multi-Module Projects"
      body: >
        A multi-module project has a parent POM listing `<modules>`. The parent defines
        shared config (`<dependencyManagement>`, `<pluginManagement>`, `<properties>`).
        Child modules inherit from the parent via `<parent>`.

        **Reactor build order:** Maven resolves inter-module dependencies and builds in the
        correct order. `mvn install -pl orders-service -am` builds only `orders-service`
        and its dependencies (`-am` = also-make). `-amd` builds everything that depends on
        the changed module (also-make-dependents).

        **Aggregator vs inheritance:** parent POM can be both an aggregator (listing modules)
        and a parent (declaring shared config). Keep them separate in large projects: a
        root aggregator POM + a separate `company-parent` POM for shared config.

        **Common pitfall:** putting application code in the parent module. The parent should
        contain only build config — never application code.
      tags:
        - {text: "reactor build order", color: blue}
        - {text: "-pl -am for partial build", color: green}
        - {text: "no code in parent", color: orange}

    - title: "⚡ Gradle Build Basics"
      body: >
        Gradle uses a **DAG of tasks** (not a fixed lifecycle). Each task declares inputs
        and outputs; Gradle runs only tasks whose inputs have changed (**incremental build**).
        Build scripts in **Kotlin DSL** (`.gradle.kts`) or Groovy (`.gradle`). Kotlin DSL
        is type-safe and IDE-friendly — preferred for new projects.

        **Key commands:** `./gradlew build` (compile + test + assemble),
        `./gradlew test`, `./gradlew clean build`, `./gradlew tasks` (list available tasks),
        `./gradlew dependencies` (dependency graph), `./gradlew :subproject:test` (run
        task in specific subproject).

        **Gradle Wrapper:** `gradlew` / `gradlew.bat` scripts download and cache the Gradle
        distribution version pinned in `gradle/wrapper/gradle-wrapper.properties`.
        Always commit the wrapper — CI uses the same Gradle version as developers.
      tags:
        - {text: "task DAG not lifecycle", color: blue}
        - {text: "incremental by default", color: green}
        - {text: "always use wrapper", color: orange}

    - title: "💾 Gradle Caching"
      body: >
        Gradle has two levels of caching: **incremental build** (local — task outputs
        cached on disk; skipped if inputs unchanged) and **build cache** (local + remote —
        task outputs identified by input hash; shared across machines and CI workers).

        **Local build cache:** enabled by default. `~/.gradle/caches/`. Tasks marked
        `@CacheTask` have their outputs stored keyed by input hash.

        **Remote build cache:** shared across all CI runners and developer machines.
        Setup: add to `settings.gradle.kts`:
        ```kotlin
        buildCache { remote<HttpBuildCache> { url = uri("https://cache.company.com/") } }
        ```
        Cache server options: Gradle Enterprise (now Develocity), Gradle Cache Node, Hazelcast.

        **Configuration cache:** (Gradle 8+) caches the result of build script evaluation.
        First run serializes task graph; subsequent runs skip script evaluation. 30–80%
        faster cold starts. Enable: `org.gradle.configuration-cache=true`.
      tags:
        - {text: "build cache = remote sharing", color: green}
        - {text: "config cache = faster startup", color: blue}
        - {text: "Develocity for analytics", color: orange}

    - title: "🔌 Plugins"
      body: >
        **Maven plugins:** bound to lifecycle phases via `<executions>`. Core plugins
        (compiler, surefire, jar) are automatically configured. Third-party plugins added
        in `<build><plugins>`. `<pluginManagement>` in parent centralizes version pinning.

        Key Maven plugins: `maven-compiler-plugin` (Java version, annotation processors),
        `maven-surefire-plugin` (unit tests), `maven-failsafe-plugin` (integration tests,
        runs in verify phase), `maven-shade-plugin` (fat JAR / uber-JAR),
        `spring-boot-maven-plugin` (executable JAR, run, build-image).

        **Gradle plugins:** applied in `plugins {}` block. Core plugins (java, application,
        java-library) add standard tasks. Community plugins from Gradle Plugin Portal.
        `java-library` vs `java`: `java-library` exposes `api` and `implementation`
        dependency configurations — `api` dependencies are on the compile classpath of
        dependents; `implementation` are not (better compile isolation).
      tags:
        - {text: "pluginManagement for versions", color: blue}
        - {text: "failsafe for ITs", color: orange}
        - {text: "api vs implementation", color: green}

    - title: "🔒 Dependency Version Control"
      body: >
        **Maven:** use `<dependencyManagement>` in the parent POM to pin versions.
        Child modules declare dependencies without versions — they inherit from the parent.
        Import external BOMs with `<scope>import</scope>`. Use Maven Versions Plugin
        (`mvn versions:display-dependency-updates`) to find outdated dependencies.

        **Gradle:** use **version catalogs** (`gradle/libs.versions.toml`) — centralized
        version definitions, type-safe accessor in build scripts:
        ```toml
        [versions]
        spring-boot = "3.3.1"
        [libraries]
        spring-boot-starter = { module = "org.springframework.boot:spring-boot-starter", version.ref = "spring-boot" }
        ```
        Reference in build: `implementation(libs.spring.boot.starter)`.

        **Lock files:** `./gradlew dependencies --write-locks` generates `*.lockfile` — pins
        exact transitive versions for reproducible builds. Commit lockfiles for applications
        (not libraries, which should stay flexible).
      tags:
        - {text: "version catalog TOML", color: green}
        - {text: "lockfiles for apps", color: blue}
        - {text: "BOM imports", color: orange}

    - title: "📤 Publishing Artifacts"
      body: >
        **Maven:** `mvn deploy` uploads the JAR + POM + sources + javadoc to the remote
        repository (Nexus, Artifactory, GitHub Packages). Configure `<distributionManagement>`
        with snapshot and release repo URLs. SNAPSHOT versions always publish; release
        versions are immutable once deployed.

        **Gradle:** `maven-publish` plugin adds `publishToMavenLocal` and `publish` tasks.
        Configure publications and repositories in `publishing {}` block. Supports publishing
        to multiple repositories (Nexus for internal, Maven Central for OSS).

        **Signing:** Maven Central requires GPG-signed artifacts. `maven-gpg-plugin` or
        `signing` Gradle plugin. CI: store GPG key in secrets, configure via environment.

        **Version strategy:** use `SNAPSHOT` / `-SNAPSHOT` during development for mutable
        builds; remove `-SNAPSHOT` for release artifacts. Semantic versioning (`MAJOR.MINOR.PATCH`).
        Automate version bumping with `maven-release-plugin` or Gradle Axion Release plugin.
      tags:
        - {text: "SNAPSHOT = mutable", color: orange}
        - {text: "release = immutable", color: green}
        - {text: "GPG for Maven Central", color: blue}

  gotchas:
    - title: "Dependency version conflicts and nearest-wins confusion"
      body: >
        Maven's nearest-wins rule resolves the same dependency appearing at different versions
        by picking the shallowest declaration in the tree. This silently downgrades a transitive
        dependency. Always run `mvn dependency:tree` after adding dependencies.
        Gradle fails on conflicts by default — configure resolution strategy if needed.
        In Gradle: `configurations.all { resolutionStrategy.failOnVersionConflict() }`.

    - title: "Using SNAPSHOT dependencies in production"
      body: >
        SNAPSHOT artifacts are mutable — the same version string (`1.0.0-SNAPSHOT`) can
        resolve to different binaries at different times. Never use SNAPSHOT dependencies
        in released or deployed artifacts. CI pipelines should use release versions only.
        Maven checks for updated SNAPSHOTs every build by default (slow); suppress with `-o`
        (offline mode) or `-nsu` (no snapshot updates) in CI when SNAPSHOTs aren't needed.

    - title: "Fat JAR with conflicting resources"
      body: >
        When using `maven-shade-plugin` or Gradle Shadow Plugin to create an uber-JAR,
        multiple JARs may contain the same file (e.g., `META-INF/services/...` SPI files,
        `spring.factories`). The default behavior is last-write-wins — some services will
        silently disappear. Configure `ServicesResourceTransformer` and `AppendingTransformer`
        in the shade plugin to merge these files correctly.

    - title: "Ignoring the Gradle wrapper version"
      body: >
        Running `gradle` directly uses whatever Gradle is installed on the machine — different
        from what's in `gradle-wrapper.properties`. Always use `./gradlew`. In CI, never
        install Gradle globally; use the wrapper. Update the wrapper version deliberately
        with `./gradlew wrapper --gradle-version 8.8`.

    - title: "Slow builds from unnecessary task re-execution"
      body: >
        Gradle's incremental build only works if tasks correctly declare all inputs and outputs.
        Custom tasks that read files without declaring them as `@InputFiles` always run.
        Use `--dry-run` to see which tasks would execute and `--profile` to generate a build
        scan showing time per task. Unexpectedly-running UP-TO-DATE checks indicate missing
        input declarations.

  when_to_use:
    - "Maven: projects requiring strict convention-over-configuration, XML-auditable builds, or heavy Maven Central publishing"
    - "Gradle: projects needing build logic customization, fast incremental builds, polyglot builds (Java + Kotlin + Android)"
    - "Multi-module monorepos where selective building (only changed modules) reduces CI time"
    - "Any JVM-based project — both tools provide far better dependency management than manual JAR management"

  when_not_to_use:
    - "Non-JVM projects — use npm/pnpm (Node), pip/Poetry (Python), Cargo (Rust), Go modules instead"
    - "Simple scripts or tools where a plain Makefile or shell script is clearer and has no dependencies"
    - "Projects where build reproducibility requirements exceed what Maven/Gradle guarantee — consider Bazel or Buck for hermetic builds"

