          value: "Compile + runtime, AND exposed to consumers' compile classpath. Use when dependency types appear in your public API. Requires java-library plugin."
        - key: "compileOnly"
          value: "Compile classpath only. Not in runtime or consumer compile. Use for: annotation processors, provided dependencies (servlet-api)."
        - key: "runtimeOnly"
          value: "Runtime classpath only. Not compile. Use for: JDBC drivers, SLF4J bindings, logging implementations."
        - key: "testImplementation"
          value: "Test compile + runtime. Not in main compile or runtime."
        - key: "testRuntimeOnly"
          value: "Test runtime only. JUnit platform launcher, Logback test config."
        - key: "annotationProcessor"
          value: "Annotation processors run at compile time. Lombok, MapStruct, Dagger."

    - title: "Common Maven Commands"
      full_width: false
      rows:
        - key: "mvn clean install"
          value: "Clean output, compile, test, package, install to local repo. Standard full build."
        - key: "mvn package -DskipTests"
          value: "Build JAR without running tests (but still compiles test sources)."
