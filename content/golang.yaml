        - {key: "select", value: "Non-deterministically picks a ready channel case. Default case = non-blocking."}
        - {key: "defer", value: "Executes at function return, in LIFO order. Args evaluated at defer site."}
        - {key: "interface", value: "Implicit satisfaction. nil interface ≠ typed nil pointer. Prefer small interfaces."}
        - {key: "struct embedding", value: "Not inheritance — promotion of methods. Compose behavior without subclassing."}
        - {key: "slice", value: "make([]T, len, cap). Three-word header: ptr, len, cap. Shares backing array."}
        - {key: "map", value: "make(map[K]V). Not concurrent-safe. Zero value is nil (panic on write). Init before use."}

    - title: "🔒 sync Package Reference"
      rows:
        - {key: "sync.Mutex", value: "Mutual exclusion. Lock() / Unlock(). Use defer mu.Unlock() after Lock()."}
        - {key: "sync.RWMutex", value: "Multiple concurrent readers, one writer. RLock/RUnlock for reads."}
        - {key: "sync.WaitGroup", value: "Add(n) before spawning, Done() in each goroutine, Wait() to block until all done."}
        - {key: "sync.Once", value: "Executes a function exactly once across goroutines. Lazy init pattern."}
        - {key: "sync.Map", value: "Concurrent map optimized for stable keys with many reads. Prefer Mutex+map for writes."}
        - {key: "sync.Pool", value: "Pool of reusable objects to reduce GC pressure. Not a cache — items may be collected."}
        - {key: "atomic", value: "sync/atomic for lock-free primitives (Add, Load, Store, CompareAndSwap) on int/ptr."}

    - title: "⚡ GC & Performance Knobs"
      rows:
        - {key: "GOGC", value: "Target heap growth ratio before GC triggers. Default 100 (100% = double). Lower = less memory, more CPU. GOGC=off disables."}
        - {key: "GOMEMLIMIT", value: "Soft memory cap (Go 1.19+). GC aggressively reclaims when near limit. Set to ~90% of container limit."}
        - {key: "GOMAXPROCS", value: "Number of OS threads for goroutines. Defaults to CPU count. Set equal to vCPU for most workloads."}
        - {key: "go build -gcflags=-m", value: "Print escape analysis decisions. Variables that escape to heap increase GC pressure."}
        - {key: "pprof", value: "CPU, heap, goroutine, mutex, block profiles. import _ net/http/pprof for /debug/pprof endpoint."}

    - title: "📦 Module & Dependency Commands"
      full_width: true
      rows:
        - {key: "go mod init module/path", value: "Initialize a new module. Creates go.mod."}
        - {key: "go get pkg@version", value: "Add or upgrade a dependency. Use @latest or @v1.2.3."}
        - {key: "go mod tidy", value: "Add missing and remove unused module requirements."}
        - {key: "go mod vendor", value: "Copy dependencies into vendor/ for offline or reproducible builds."}
        - {key: "go mod graph", value: "Print the module dependency graph."}
        - {key: "go list -m all", value: "List all modules in the build (direct and transitive)."}

  cli:
