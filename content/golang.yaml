# ── OVERVIEW ──────────────────────────────────────────────────────────────────
overview:
  concepts:
    - title: "🔄 Goroutines & the Scheduler"
      body: >
        A **goroutine** is a lightweight thread managed by the Go runtime, starting at ~2 KB of
        stack (grows dynamically). The runtime uses an **M:N scheduler**: M goroutines multiplexed
        over N OS threads (`GOMAXPROCS` OS threads, defaults to CPU count). The scheduler is
        cooperative-preemptive — goroutines yield at function calls, channel ops, and since Go 1.14,
        at safe points during long loops. `go f()` costs ~1 µs; spawning millions is practical.
      flows:
        - ["Goroutine (G)", "P (logical processor)", "M (OS thread)", "CPU core"]
      tags:
        - {text: "M:N scheduling", color: green}
        - {text: "~2 KB initial stack"}
        - {text: "GOMAXPROCS", color: orange}

    - title: "📡 Channels & CSP"
      body: >
        Go's concurrency model is based on **Communicating Sequential Processes (CSP)**: share
        memory by communicating, don't communicate by sharing memory. A channel is a typed conduit
        between goroutines. **Unbuffered**: sender blocks until receiver is ready — synchronization
        point. **Buffered**: sender blocks only when the buffer is full — decouples pace.
        `close(ch)` signals no more values; `range ch` drains and exits on close.
      flows:
        - ["Sender goroutine", "chan T (buffer)", "Receiver goroutine"]
      tags:
        - {text: "CSP model", color: purple}
        - {text: "unbuffered = sync"}
        - {text: "buffered = async", color: green}

    - title: "🧩 Interfaces & Implicit Satisfaction"
      body: >
        Go interfaces are **satisfied implicitly** — no `implements` keyword. Any type with the
        required method set satisfies the interface. This enables duck typing with compile-time
        safety. The empty interface (`any` / `interface{}`) accepts all types.
        **Composition** is the Go idiom: embed small interfaces (`io.Reader`, `io.Writer`) and
        compose larger ones. Avoid large interfaces — they couple callers to implementations.
      tags:
        - {text: "implicit satisfaction", color: green}
        - {text: "composition over inheritance", color: purple}
        - {text: "accept interfaces, return structs"}

    - title: "🗑️ Memory Model & GC"
      body: >
        Go uses a concurrent **tri-color mark-and-sweep GC** with very short stop-the-world
        (STW) pauses (typically <1 ms). The GC is triggered by heap growth (controlled by
        `GOGC`, default 100 — GC runs when heap doubles since last collection).
        **Escape analysis** decides whether a variable lives on the stack (fast, no GC) or
        heap (GC managed). Values that outlive their function or are too large escape to heap.
        Check with `go build -gcflags="-m"`.
      tags:
        - {text: "concurrent GC", color: green}
        - {text: "GOGC controls frequency"}
        - {text: "escape analysis = stack vs heap", color: orange}

    - title: "⚠️ Error Handling"
      body: >
        Errors are plain values implementing the `error` interface. Functions return `(result, error)`
        — callers must check. **Sentinel errors**: `var ErrNotFound = errors.New(...)` for equality
        checks. **Error wrapping** (`fmt.Errorf("doing X: %w", err)`) preserves the chain.
        `errors.Is` walks the chain for equality; `errors.As` walks it for type assertion.
        `panic` is for unrecoverable programmer errors (nil dereference, index out of bounds) —
        not a control-flow mechanism.
      tags:
        - {text: "errors are values", color: green}
        - {text: "%w wrapping", color: orange}
        - {text: "errors.Is / errors.As"}

    - title: "🎯 Context & Cancellation"
      body: >
        `context.Context` carries deadlines, cancellation signals, and request-scoped values
        across API boundaries. **Always** accept `ctx context.Context` as the first parameter
        of any function doing I/O or waiting. `context.WithCancel` returns a cancel function
        you must call (defer it). `context.WithTimeout` and `context.WithDeadline` auto-cancel.
        A cancelled context propagates through the whole call chain — the correct way to stop
        a goroutine tree without goroutine leaks.
      flows:
        - ["context.Background()", "WithTimeout / WithCancel", "Propagate via function args", "Check ctx.Done()"]
      tags:
        - {text: "first arg convention", color: green}
        - {text: "defer cancel()", color: orange}
        - {text: "goroutine tree cancellation", color: purple}

  gotchas:
    - title: "Goroutine leaks — the silent memory drain"
      body: >
        A goroutine blocked forever on a channel send/receive with no reader/writer leaks memory
        until the process restarts. Common causes: HTTP handlers spawning goroutines without a
        done channel, worker goroutines ignoring context cancellation, range over a channel that
        is never closed. Detect with `runtime.NumGoroutine()` or `pprof`'s goroutine profile.
        Fix by passing context and checking `ctx.Done()` in every long-running goroutine.

    - title: "Nil interface != nil pointer"
      body: >
        An interface value holds a (type, pointer) pair. A nil pointer wrapped in an interface
        is NOT nil — the interface has a type. `var e *MyError = nil; var err error = e; err != nil`
        evaluates to **true**. Return bare `nil` from functions returning `error`, never a
        typed nil pointer. This trips up almost every Go developer at some point.

    - title: "Loop variable capture in goroutines"
      body: >
        In Go < 1.22, all iterations of a for loop share the same variable. Goroutines launched
        in a loop that capture the variable by reference all see its final value.
        Fix (pre-1.22): shadow the variable inside the loop (`i := i`) or pass it as a
        function argument. In Go 1.22+, each iteration creates a new variable — this gotcha
        is eliminated for range loops.

    - title: "Slice aliasing — unexpected mutation"
      body: >
        Slices share an underlying array until one grows beyond capacity (triggering a copy).
        Appending to a sub-slice modifies the original array if capacity allows.
        Functions that receive a slice can mutate the caller's data. When you need a true
        independent copy, use `make` + `copy`. Be explicit about whether a function takes
        ownership of a slice or just reads it.

    - title: "Maps are not concurrent-safe"
      body: >
        Concurrent reads are safe, but any concurrent write (including delete) causes a race and
        runtime panic (`concurrent map read and map write`). Protect with `sync.RWMutex` or
        use `sync.Map` (optimized for high-read, low-write and stable key sets). The race detector
        (`-race`) catches this at runtime — always run tests with it in CI.

    - title: "defer in loops doesn't run at loop end"
      body: >
        `defer` runs at **function return**, not at the end of a loop iteration. Deferring a
        `file.Close()` inside a loop that opens many files will exhaust file descriptors before
        any are closed. Fix: extract the body into a function and defer inside it, or close explicitly
        without defer in the loop.

  when_to_use:
    - "High-concurrency network services — HTTP servers, gRPC services, proxies"
    - "Infrastructure tooling, CLIs, and daemons (Go's standard library is excellent here)"
    - "Microservices where fast startup, small binary, and predictable latency matter"
    - "Systems programming where you need control but not Rust's borrow checker complexity"
    - "Teams that want simple, readable concurrency without callback hell or async/await"

  when_not_to_use:
    - "Heavy numerical computing or ML — Python/NumPy ecosystem is far richer"
    - "Rapid UI prototyping — Go has no mainstream GUI or frontend framework"
    - "When you need JVM ecosystem integration (existing Java/Kotlin libraries)"
    - "Code-heavy scripting where Python's brevity and REPL workflow is a better fit"
    - "When team is already expert in another language and the concurrency needs are low"

