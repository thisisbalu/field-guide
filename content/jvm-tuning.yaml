deep_dive:
  tables:
    - title: "Key JVM Flags"
      full_width: false
      rows:
        - key: "-Xms / -Xmx"
          value: "Initial / maximum heap size. Set equal in prod (-Xms4g -Xmx4g) to avoid expansion pauses."
        - key: "-XX:MaxRAMPercentage"
          value: "Set heap as % of container RAM limit (Java 10+). Use 70-75% in containers. Replaces -Xmx."
        - key: "-XX:+UseG1GC"
          value: "Enable G1 GC (default since Java 9). Balanced throughput/latency. Good for most apps."
        - key: "-XX:+UseZGC"
          value: "Enable ZGC (Java 15+ for production). Sub-millisecond GC pauses. Use for latency-critical services."
        - key: "-XX:MaxGCPauseMillis"
          value: "G1 pause time target (default 200ms). Not a guarantee. Lower = more frequent GC cycles."
        - key: "-XX:G1HeapRegionSize"
          value: "G1 region size (1MB–32MB). Auto-calculated. For large heaps: -XX:G1HeapRegionSize=16m."
        - key: "-XX:+FlightRecorder"
          value: "Enable JFR continuous profiling (<2% overhead). Available in production."
        - key: "-Xlog:gc*:file=gc.log:time,uptime:filecount=5,filesize=20m"
          value: "Enable GC logging to rotating files. Essential for diagnosing GC issues."
        - key: "-XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp"
          value: "Automatically take heap dump on OOM. Critical for post-mortem analysis."
        - key: "-XX:+PrintCompilation"
          value: "Log JIT compilation events. Use for diagnosing warmup or deoptimization issues."
        - key: "-XX:+UseStringDeduplication"
          value: "G1 only. JVM deduplicates identical String objects. Reduces heap for string-heavy apps."
        - key: "-Xss"
          value: "Thread stack size (default 512KB-1MB). Reduce for apps with thousands of threads: -Xss256k."

    - title: "GC Algorithm Selection Guide"
      full_width: true
      rows:
        - key: "Serial (-XX:+UseSerialGC)"
          value: "Single-threaded GC. Heap < 100MB. Single-core. CLI tools, small containers. Not for web services."
        - key: "Parallel (-XX:+UseParallelGC)"
          value: "Multi-threaded GC, stop-the-world. Max throughput. Batch processing, ETL. High STW pauses (seconds for large heaps). Default before Java 9."
        - key: "G1 (-XX:+UseG1GC)"
          value: "Default since Java 9. Region-based. Targets pause time goal. Good balance. Best for: Heap 4GB–32GB, mixed workloads, web services. Tune: -XX:MaxGCPauseMillis=100."
        - key: "ZGC (-XX:+UseZGC)"
          value: "Sub-millisecond concurrent GC. Heap up to 16TB. Java 15+ production-ready. 5-15% throughput overhead. Best for: latency SLOs < 10ms, very large heaps, trading systems."
        - key: "Shenandoah (-XX:+UseShenandoahGC)"
          value: "Like ZGC. Concurrent compaction. Available in OpenJDK, not Oracle JDK. Good alternative to ZGC."

    - title: "Memory Troubleshooting Commands"
      full_width: false
      rows:
        - key: "jps"
          value: "List JVM processes and PIDs on local machine."
        - key: "jstat -gcutil <pid> 1000"
          value: "GC statistics every 1 second: Eden%, Old%, Metaspace%, GC count, GC time."
        - key: "jmap -heap <pid>"
          value: "Print heap summary: GC algorithm, heap configuration, heap usage by region."
        - key: "jmap -histo:live <pid> | head -30"
          value: "Histogram of live objects by class. Forces GC first. Use with caution in production."
        - key: "jmap -dump:live,format=b,file=heap.hprof <pid>"
          value: "Full heap dump. Large heap = large file + STW pause. Analyze with Eclipse MAT."
        - key: "jstack <pid>"
          value: "Thread dump: all thread states, stack traces. Find deadlocks, BLOCKED threads."
        - key: "jcmd <pid> VM.flags"
          value: "Print all active JVM flags including defaults. Verify your -XX flags took effect."
        - cmd: "jcmd <pid> JFR.start duration=60s filename=app.jfr"
          desc: "Start a 60-second JFR recording on a running JVM."
        - key: "jcmd <pid> GC.heap_info"
          value: "Print current heap usage without causing GC."

    - title: "Virtual Threads (Java 21)"
      full_width: false
      rows:
        - key: "What they are"
          value: "Lightweight threads managed by JVM scheduler, not OS threads. Millions can exist vs thousands of platform threads."
        - key: "How they work"
          value: "Virtual thread mounts on a carrier (OS) thread. On blocking I/O, it unmounts (carrier is free). Remounts when I/O completes. OS thread never blocks."
        - key: "Enable in Spring Boot"
          value: "spring.threads.virtual.enabled=true (Spring Boot 3.2+). Tomcat/Jetty request threads become virtual."
        - key: "Best for"
          value: "High-concurrency I/O-bound services. Eliminates need to tune thread pool sizes for I/O-bound work."
        - key: "Limitations"
          value: "Don't use for CPU-intensive tasks (no parallelism benefit). Avoid synchronized blocks (pins carrier thread). Use ReentrantLock instead."
        - key: "Monitoring"
          value: "JFR virtual thread events. JDK Mission Control. jstack shows virtual threads."

  comparison:
