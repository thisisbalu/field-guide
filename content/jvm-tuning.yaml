# ── OVERVIEW ──────────────────────────────────────────────────────────────────
overview:
  concepts:
    - title: "🏗️ JVM Memory Areas"
      body: >
        The JVM divides memory into distinct regions:

        **Heap:** where objects live. Divided into **Young Generation** (Eden + Survivor spaces S0/S1)
        and **Old Generation** (Tenured). Most objects die young (generational hypothesis) — GC
        exploits this by collecting Young Gen far more frequently.

        **Metaspace** (Java 8+, replaced PermGen): class metadata, method bytecode, interned
        strings. Grows dynamically (bounded by `-XX:MaxMetaspaceSize`). PermGen was fixed-size
        and a common source of `OutOfMemoryError: PermGen space` errors.

        **Stack:** per-thread. Holds stack frames (local variables, operand stack). Default
        512KB–1MB per thread (`-Xss`). Many threads + large stacks = significant memory.

        **Native/off-heap:** used by NIO DirectBuffers, mapped files, JVM internals. Not managed
        by the GC — leaks are silent until the process crashes.

        **Code Cache:** JIT-compiled native code. Bounded by `-XX:ReservedCodeCacheSize` (default 240MB in Java 11+).
      tags:
        - {text: "heap = GC-managed", color: blue}
        - {text: "metaspace = dynamic", color: green}
        - {text: "stack per thread", color: orange}

    - title: "♻️ Garbage Collection Basics"
      body: >
        GC reclaims memory by identifying unreachable objects. Key concepts:

        **Minor GC (Young Gen):** fast (milliseconds). Runs frequently. Live objects copied
        from Eden to a Survivor space. Objects surviving enough GCs (threshold controlled by
        `-XX:MaxTenuringThreshold`) are promoted to Old Gen.

        **Major/Full GC (Old Gen or full heap):** slow (tens of milliseconds to seconds).
        Stop-The-World pauses freeze all application threads. Triggered when Old Gen fills up.

        **Stop-The-World (STW):** all application threads are paused while GC runs.
        For low-latency applications, minimizing STW pause duration is the primary goal.

        **GC trade-off triangle:** you can optimize for throughput (max CPU for the app),
        latency (minimize pause durations), or memory footprint (minimize heap size). You
        can't fully optimize all three simultaneously — choose your primary constraint first.
      tags:
        - {text: "Minor GC = fast", color: green}
        - {text: "STW = latency killer", color: red}
        - {text: "throughput vs latency", color: orange}

    - title: "🗑️ GC Algorithms"
      body: >
        **Serial GC** (`-XX:+UseSerialGC`): single-threaded. Good for small heaps / single-core.

        **Parallel GC** (`-XX:+UseParallelGC`): multiple threads for GC. Maximizes throughput.
        High STW pauses. Good for batch processing where latency doesn't matter.

        **G1 GC** (`-XX:+UseG1GC`, default since Java 9): divides heap into equal-sized regions.
        Incremental collection — collects the most garbage-dense regions first. Targets a pause
        time goal (`-XX:MaxGCPauseMillis=200`). Good balance of throughput and latency.
        Best for most applications with heap > 4GB.

        **ZGC** (`-XX:+UseZGC`, production since Java 15): ultra-low latency. Sub-millisecond
        pauses regardless of heap size (tested up to 16TB). Concurrent — most work done while
        app runs. Small throughput overhead (~15%). Best for latency-critical services.

        **Shenandoah** (Red Hat, similar to ZGC): also sub-millisecond concurrent GC.
        Available in OpenJDK builds.
      tags:
        - {text: "G1 = default, balanced", color: green}
        - {text: "ZGC = sub-ms latency", color: blue}
        - {text: "Parallel = max throughput", color: orange}

    - title: "📏 Heap Sizing"
      body: >
        `-Xms` sets the initial heap size; `-Xmx` sets the maximum. Best practice: set
        `-Xms == -Xmx` in production to avoid heap expansion pauses and to give the JVM
        a predictable footprint. Heap expansion triggers a Full GC.

        **Right-sizing:** size the heap so the **live data set** (objects that survive a
        Full GC) fits comfortably. Rule of thumb: `Xmx = 2–3× live data set size`.
        Too small → frequent GC. Too large → long Full GC pauses (GC scans all of heap).

        **Container awareness (Java 10+):** the JVM now reads cgroup memory limits.
        `-XX:MaxRAMPercentage=75.0` sets heap to 75% of the container's memory limit.
        Default `MaxRAMPercentage` is 25% — too conservative for most Java apps.
        Set to 70–80%, leaving headroom for the JVM itself (Metaspace, Code Cache, threads, native).

        **Young Gen sizing:** `-XX:NewRatio=2` = Old Gen is 2× Young Gen (default for G1 this
        is managed automatically). Larger Young Gen → less frequent Minor GC but larger pauses.
      tags:
        - {text: "Xms=Xmx in prod", color: green}
        - {text: "MaxRAMPercentage in containers", color: blue}
        - {text: "2-3x live data set", color: orange}

    - title: "🔥 JIT Compilation"
      body: >
        The JVM interprets bytecode initially, then the JIT (Just-In-Time) compiler identifies
        hot methods (called frequently) and compiles them to native machine code.

        **Two JIT tiers (HotSpot):**
        - **C1 (Client compiler):** fast compilation, light optimization. Good for short-lived code.
        - **C2 (Server compiler):** slow compilation, aggressive optimization. Used for hot code paths.
        - **Tiered compilation** (default since Java 8): starts with C1, promotes hot methods to C2.

        **JIT warmup:** a freshly started JVM performs worse than a warmed-up one.
        The first 30–120 seconds may show higher latency and lower throughput while C2 is compiling
        hot methods. This affects: cold starts in serverless/containers, post-deploy canary tests.

        **GraalVM Native Image:** ahead-of-time (AOT) compile Java to a native binary. Zero
        warmup, much lower memory footprint, fast startup (milliseconds). Trade-off: no JIT
        optimization at runtime; some Java reflection/dynamic features need configuration;
        slower peak throughput than JIT after warmup. Best for CLI tools and serverless.
      tags:
        - {text: "tiered compilation", color: blue}
        - {text: "warmup = first 1-2 min", color: orange}
        - {text: "GraalVM for fast start", color: green}

    - title: "📊 Profiling & Diagnostics"
      body: >
        **Java Flight Recorder (JFR):** low-overhead (<2%) continuous profiling built into the
        JVM. Records: GC events, thread activity, CPU usage, I/O, lock contention, method
        profiling. Enable: `-XX:+FlightRecorder -XX:StartFlightRecording=duration=60s,filename=app.jfr`.
        Analyze with JDK Mission Control (JMC) or async-profiler.

        **async-profiler:** open-source CPU/allocation/lock profiler. Uses perf_events (Linux)
        for accurate CPU profiling. Generates flame graphs. Attach to running JVM:
        `./profiler.sh -d 30 -f profile.html <pid>`.

        **GC log analysis:** `-Xlog:gc*:file=gc.log:time,uptime:filecount=5,filesize=20m`.
        Tools: GCEasy.io (online parser), GCViewer (local).

        **Heap dumps:** `jmap -dump:live,format=b,file=heap.hprof <pid>`. Analyze with
        Eclipse MAT (Memory Analyzer Tool) or VisualVM. Find: largest retained objects,
        suspected memory leaks, duplicate string instances.

        **Thread dumps:** `jstack <pid>` or `kill -3 <pid>`. Shows all thread states. Find:
        deadlocks, threads blocked on locks, threads stuck in `WAITING`/`TIMED_WAITING`.
      tags:
        - {text: "JFR = low overhead", color: green}
        - {text: "async-profiler + flame graph", color: blue}
        - {text: "MAT for heap dumps", color: orange}

    - title: "🔒 Memory Leaks"
      body: >
        Memory leaks in Java occur when objects are still referenced (not GC-eligible) but
        are no longer needed. Common causes:

        **Static collections:** `static Map<K, V>` that grows unboundedly. Entries are never
        removed. Lives for the JVM lifetime.

        **Listener/callback registration without deregistration:** event listeners, MBean
        registrations, Guava EventBus subscribers. Object added to a registry; caller forgets
        to remove. Registry holds a strong reference.

        **Thread-local variables:** `ThreadLocal` values in a thread pool survive task completion.
        If a task sets a ThreadLocal and doesn't call `remove()`, the value leaks for the thread's
        lifetime.

        **Classloader leaks:** web app redeployment in an app server (Tomcat) — new classloader
        per deployment. If old classloader is referenced by a static field (JDBC driver, logging),
        it can't be GC'd. Causes Metaspace growth on redeployment.

        **Off-heap (DirectByteBuffer):** buffers acquired and not released. GC manages the
        wrapper object but the native memory is reclaimed only when the wrapper is GC'd.
        `sun.misc.Cleaner` eventually reclaims, but in OutOfMemoryError scenarios GC may
        not run often enough.
      tags:
        - {text: "static collections grow", color: red}
        - {text: "ThreadLocal.remove()", color: orange}
        - {text: "classloader leaks", color: orange}

    - title: "🧵 Thread & Lock Tuning"
      body: >
        **Thread pools:** most Java web servers and frameworks use a thread pool. Threads
        are expensive (~512KB–1MB stack each). For 500 threads: 250–500MB stack memory.
        Tune pool size based on workload: **CPU-bound** tasks: `threads = CPU cores + 1`.
        **I/O-bound** tasks: `threads = CPU cores × (1 + wait_time / compute_time)`.
        Over-provisioning threads causes context switching overhead; under-provisioning causes
        queuing under load.

        **Virtual Threads (Java 21 — Project Loom):** lightweight threads managed by the JVM,
        not the OS. Millions of virtual threads are possible. Blocking I/O unmounts the virtual
        thread from its carrier (OS) thread and remounts when I/O completes. Dramatically
        simplifies I/O-bound services — write synchronous code, get async performance.
        Enable in Spring Boot 3.2: `spring.threads.virtual.enabled=true`.

        **Lock contention:** threads blocking on synchronized or locks reduces concurrency.
        Detect with thread dumps (`BLOCKED` state) or JFR lock contention events.
        Fix: reduce lock scope, use `ConcurrentHashMap` instead of `synchronized HashMap`,
        use `ReentrantReadWriteLock` for read-heavy maps, eliminate locks via immutability.
      tags:
        - {text: "Virtual Threads Java 21", color: green}
        - {text: "BLOCKED = contention", color: red}
        - {text: "pool size by workload type", color: blue}

  gotchas:
    - title: "Setting -Xmx too high in containers without cgroup awareness"
      body: >
        Before Java 10, the JVM did not read container cgroup memory limits. `-Xmx` defaulted
        to 25% of the physical host memory (not the container limit). A container with 2GB limit
        on a 64GB host would set heap to 16GB — exceeding the container limit and causing OOMKilled.
        Java 10+ respects cgroups. Always use `-XX:MaxRAMPercentage` instead of a fixed `-Xmx`
        in containerized deployments to dynamically set heap relative to the container's actual limit.

    - title: "Ignoring GC pause times until production incidents"
      body: >
        GC pauses are invisible in normal application metrics but directly cause P99 latency
        spikes. A 500ms Full GC pause appears as a P99 timeout spike. Enable GC logging from
        day one: `-Xlog:gc*:file=gc.log:time,uptime`. Review GC logs in staging load tests.
        If P99 spikes under load correlate with GC events, tune before production.

    - title: "Using System.gc() in application code"
      body: >
        `System.gc()` is a hint (not a command) to the JVM to run GC. In production it often
        triggers a Full GC, causing a STW pause. It's almost never the right solution. If
        you're calling it to reclaim memory, the real problem is a memory leak or incorrect
        heap sizing. Remove all `System.gc()` calls from application code.

    - title: "Heap dumps in production without a plan"
      body: >
        A heap dump from a large JVM (e.g., 8GB heap) takes several seconds of STW time and
        produces an 8GB file. Triggering this on a production pod without planning is a
        significant availability risk. Have a plan: dedicated diagnostic pod, reduced traffic
        during dump, sufficient disk space, secure transfer of the file (it contains production data).

    - title: "Thread pool starvation with blocking I/O"
      body: >
        A reactive framework (Spring WebFlux) uses a small event loop thread pool (1 thread per
        CPU core). Performing blocking I/O (JDBC, file I/O) on event loop threads blocks the
        entire thread pool — all other requests are starved. Either use async drivers (R2DBC
        for databases) or offload blocking calls to a separate thread pool
        (`Schedulers.boundedElastic()` in Reactor).

  when_to_use:
    - "Diagnosing P99 latency spikes correlated with GC pauses in production"
    - "Sizing a new Java service for deployment in Kubernetes containers"
    - "Investigating memory growth (heap or native) trending upward over time"
    - "Optimizing throughput or startup time for latency-sensitive or serverless Java workloads"

  when_not_to_use:
    - "Premature optimization — profile first, tune second. Measure the actual bottleneck before adjusting JVM flags."
    - "Non-JVM services — these concepts are specific to Java, Kotlin, Scala, Groovy on the HotSpot/OpenJDK JVM"

