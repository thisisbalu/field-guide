name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate HTML
        run: python generate.py

      - name: Collect generated files
        run: |
          mkdir -p dist
          cp *.html dist/

      - name: Deploy to blog under /projects/field-guide
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.BLOG_DEPLOY_TOKEN }}
          external_repository: thisisbalu/thisisbalu.github.io
          publish_branch: master
          publish_dir: dist
          destination_dir: projects/field-guide
          keep_files: true
          commit_message: "deploy: field-guide ${{ github.sha }}"
